labels:
  - name: bug
    color: d73a4a
    description: Something isn't working as specified

  - name: enhancement
    color: a2eeef
    description: New specification or improvement

  - name: documentation
    color: 0075ca
    description: Improvements or additions to documentation

  - name: question
    color: d876e3
    description: Further information is requested

  - name: wontfix
    color: ffffff
    description: This will not be worked on

  - name: duplicate
    color: cfd3d7
    description: This issue or pull request already exists

  - name: good first issue
    color: 7057ff
    description: Good for newcomers

  - name: help wanted
    color: 008672
    description: Extra attention is needed

  - name: priority: high
    color: b60205
    description: High priority specification

  - name: priority: medium
    color: fbca04
    description: Medium priority specification

  - name: priority: low
    color: 0e8a16
    description: Low priority specification

  - name: specification
    color: 006b75
    description: Related to specification content

  - name: example
    color: c5def5
    description: Related to examples or demonstrations

  - name: breaking-change
    color: e99695
    description: Breaking change to existing specification

  - name: needs-review
    color: e4e669
    description: Needs review from maintainers

  - name: approved
    color: 0e8a16
    description: Approved by maintainers
