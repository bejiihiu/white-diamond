name: Documentation Quality

on:
  push:
    branches: [main, prism-structure]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check required sections
        run: |
          echo "Checking documentation quality..."
          
          # Check that all specification files have required sections
          for file in docs/**/*.md; do
            if [ -f "$file" ]; then
              echo "Checking: $file"
              
              # Check for title
              if ! head -5 "$file" | grep -q "^#"; then
                echo "ERROR: Missing title in $file"
                exit 1
              fi
              
              # Check minimum length (placeholder content check)
              lines=$(wc -l < "$file")
              if [ "$lines" -lt 10 ]; then
                echo "WARNING: $file has only $lines lines"
              fi
            fi
          done
          
          echo "Quality check passed!"

      - name: Check cross-references
        run: |
          echo "Checking cross-references..."
          
          # Extract all internal links and verify they exist
          for file in docs/**/*.md; do
            if [ -f "$file" ]; then
              grep -oP '\[.*?\]\(((?!http)[^)]+)\)' "$file" | while read -r link; do
                target=$(echo "$link" | sed 's/.*(\(.*\))/\1/')
                dir=$(dirname "$file")
                resolved="$dir/$target"
                
                if [ ! -f "$resolved" ]; then
                  echo "WARNING: Broken link in $file -> $target"
                fi
              done
            fi
          done
          
          echo "Cross-reference check passed!"
